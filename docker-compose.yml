# v2
# docker-compose.yml — LOCAL DEVELOPMENT ONLY
# ─────────────────────────────────────────────────────────────────────────────
# DATA LOSS FIX: postgres data lives in a NAMED VOLUME (postgres_dev_data).
#
# Named volumes survive:
#   ✅ docker-compose down          (stop)
#   ✅ docker-compose restart
#   ✅ image rebuilds
#
# Data is only wiped by:
#   ⚠️  docker-compose down -v     (you must explicitly pass -v)
#   ⚠️  docker volume rm app_postgres_dev_data
#
# Quick start:
#   docker-compose up -d
#   npm run migration:run:dev
# ─────────────────────────────────────────────────────────────────────────────

version: '3.9'

services:

  # ── Postgres ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: app_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: commerceos
      POSTGRES_USER: commerceos
      POSTGRES_PASSWORD: commerceos
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
    ports:
      - "5434:5432"
    volumes:
      # ✅ Named volume — this is what prevents data loss
      - postgres_dev_data:/var/lib/postgresql/data
      # Runs once on first container creation only
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: app_api_dev
    restart: unless-stopped
    env_file:
      - apps/api/.env.development
    environment:
      NODE_ENV: development
      POSTGRES_HOST: postgres   # docker service name, not localhost
      POSTGRES_PORT: 5432
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
  redis:
    image: redis:7
    container_name: commerceos_redis
    ports:
      - "6379:6379"
  # ── Backup (dev — dumps to ./backups/dev/ on your machine) ──────────────────
  # Runs once at startup, then daily at 2am.
  # Local only — no cloud upload in dev unless you add B2 vars.
  backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    container_name: app_backup_dev
    restart: unless-stopped
    environment:
      DATABASE_URL:       "postgresql://postgres:postgres@postgres:5432/app_dev"
      BACKUP_SCHEDULE:    "0 2 * * *"   # 2am daily
      BACKUP_RETAIN_DAYS: "7"
      BACKUP_ENV:         "dev"
      BACKUP_LOCAL_ONLY:  "true"        # flip to false + add B2 vars to upload
      # B2_ACCOUNT_ID:    ""
      # B2_ACCOUNT_KEY:   ""
      # B2_BUCKET:        ""
    volumes:
      - ./backups/dev:/backups          # persisted on your machine
    depends_on:
      postgres:
        condition: service_healthy

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres_dev_data:
    driver: local
