version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: commerceos_postgres
    environment:
      POSTGRES_USER: commerceos
      POSTGRES_PASSWORD: commerceos
      POSTGRES_DB: commerceos
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: commerceos_redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
